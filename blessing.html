<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>축복이와 함께하는 우리집</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(20, 29, 61, 0.92);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-strong: #7dd3fc;
      --danger: #fb7185;
      --radius: 24px;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 25%),
        linear-gradient(180deg, #020617 0%, #08102a 100%);
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 18px 36px;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.05;
    }

    header p {
      margin: 12px auto 0;
      max-width: 32rem;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 18px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
    }

    .form-group {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    input[type="text"],
    input[type="password"],
    input[type="file"],
    textarea {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      padding: 14px 16px;
      font-size: 1rem;
    }

    input[type="file"] {
      padding: 10px 12px;
      background: rgba(15, 23, 42, 0.7);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .row {
      display: grid;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 1rem;
      color: #0f172a;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button.secondary {
      color: var(--text);
      background: rgba(148, 163, 184, 0.14);
    }

    button.danger {
      background: #fb7185;
      color: #0f172a;
    }

    .help-text {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      margin-top: 8px;
    }

    .message {
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.95rem;
      line-height: 1.4;
      margin-top: 10px;
    }

    .message.success {
      background: rgba(52, 211, 153, 0.14);
      color: #a7f3d0;
    }

    .message.error {
      background: rgba(251, 113, 133, 0.14);
      color: #fecdd3;
    }

    .hidden {
      display: none !important;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .countdown-card {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 20px;
      padding: 18px;
      text-align: center;
    }

    .countdown-card strong {
      display: block;
      font-size: 2.2rem;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      transition: transform 0.3s ease;
    }

    .countdown-card span {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .pulse {
      animation: pulse 0.7s ease;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
      100% {
        transform: scale(1);
      }
    }

    .gallery-grid {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .gallery-grid img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .guestbook-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .guestbook-item {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .guestbook-item time {
      display: block;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .top-bar strong {
      font-size: 0.95rem;
      color: var(--text);
    }

    @media (min-width: 640px) {
      .row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>축복이와 함께하는 우리집</h1>
      <p>처음 접속 시 이름과 4자리 숫자 비밀번호를 입력해 메일로 권한을 요청하세요. 담당자가 승인하면 이후에는 같은 정보로 바로 접속할 수 있습니다.</p>
    </header>

    <section id="auth-screen" class="card">
      <h2>접속 권한 확인</h2>
      <form id="auth-form">
        <div class="form-group">
          <label>
            이름
            <input type="text" id="name-input" placeholder="이름을 입력하세요" autocomplete="name" required />
          </label>
          <label>
            4자리 비밀번호
            <input type="password" id="password-input" placeholder="1234" maxlength="4" pattern="\d{4}" required />
          </label>
          <label>
            승인 코드
            <input type="text" id="approval-input" placeholder="관리자 승인 코드 (승인 후 입력)" autocomplete="off" />
          </label>
        </div>
        <div class="row">
          <button type="button" id="request-btn">권한 요청하기</button>
          <button type="submit" id="login-btn" class="secondary">로그인</button>
        </div>
      </form>
      <p class="help-text">요청 후 담당자가 승인 코드를 보내주면 입력하고 로그인하세요. 승인된 이후에는 이름/비밀번호로 바로 접속할 수 있습니다.</p>
      <div id="auth-message"></div>
    </section>

    <main id="app-screen" class="hidden">
      <div class="top-bar">
        <strong id="welcome-text">환영합니다!</strong>
        <button id="logout-btn" class="danger secondary">로그아웃</button>
      </div>

      <section class="card">
        <h2>축복이 탄생까지 남은 시간</h2>
        <div class="countdown-grid">
          <div class="countdown-card">
            <strong id="days">0</strong>
            <span>일</span>
          </div>
          <div class="countdown-card">
            <strong id="hours">00</strong>
            <span>시간</span>
          </div>
          <div class="countdown-card">
            <strong id="minutes">00</strong>
            <span>분</span>
          </div>
          <div class="countdown-card">
            <strong id="seconds">00</strong>
            <span>초</span>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>사진 갤러리</h2>
        <form id="gallery-form">
          <div class="form-group">
            <label>
              사진 선택
              <input type="file" id="photo-input" accept="image/*" />
            </label>
          </div>
          <button type="submit">갤러리에 추가</button>
        </form>
        <div id="gallery-grid" class="gallery-grid"></div>
      </section>

      <section class="card">
        <h2>축복이에게 한마디</h2>
        <form id="guestbook-form">
          <div class="form-group">
            <label>
              메시지
              <textarea id="message-input" maxlength="120" placeholder="축복이에게 남기고 싶은 말을 적어주세요." required></textarea>
            </label>
          </div>
          <button type="submit">남기기</button>
        </form>
        <div id="guestbook-list" class="guestbook-list"></div>
      </section>
    </main>
  </div>

  <script>
    const MANAGER_EMAIL = "yoonjks1017@gmail.com";
    const APPROVAL_CODE = "BLESSING2026";

    const authScreen = document.getElementById("auth-screen");
    const appScreen = document.getElementById("app-screen");
    const authForm = document.getElementById("auth-form");
    const requestBtn = document.getElementById("request-btn");
    const nameInput = document.getElementById("name-input");
    const passwordInput = document.getElementById("password-input");
    const approvalInput = document.getElementById("approval-input");
    const authMessage = document.getElementById("auth-message");
    const welcomeText = document.getElementById("welcome-text");
    const logoutBtn = document.getElementById("logout-btn");

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    const galleryForm = document.getElementById("gallery-form");
    const photoInput = document.getElementById("photo-input");
    const galleryGrid = document.getElementById("gallery-grid");

    const guestbookForm = document.getElementById("guestbook-form");
    const messageInput = document.getElementById("message-input");
    const guestbookList = document.getElementById("guestbook-list");

    const targetDate = new Date("2026-10-23T00:00:00");

    function loadApprovedUser() {
      return JSON.parse(localStorage.getItem("blessingApprovedUser") || "null");
    }

    function setMessage(text, type = "success") {
      authMessage.innerHTML = `<div class="message ${type}">${text}</div>`;
    }

    function validateCredentials(name, password) {
      return name && /^\d{4}$/.test(password);
    }

    function openMailClient(name, password) {
      const subject = encodeURIComponent("축복이 홈페이지 접속 권한 요청");
      const body = encodeURIComponent(
        `안녕하세요,\n\n이름: ${name}\n비밀번호: ${password}\n\n위 정보로 축복이 홈페이지 접속 권한을 요청합니다.\n\n감사합니다.`
      );
      window.location.href = `mailto:${MANAGER_EMAIL}?subject=${subject}&body=${body}`;
    }

    function requestAccess() {
      const name = nameInput.value.trim();
      const password = passwordInput.value.trim();

      if (!validateCredentials(name, password)) {
        setMessage("이름과 4자리 숫자 비밀번호를 정확히 입력하세요.", "error");
        return;
      }

      localStorage.setItem(
        "blessingAccessRequest",
        JSON.stringify({ name, password, requestedAt: new Date().toISOString() })
      );

      openMailClient(name, password);
      setMessage(
        "요청 메일이 열렸습니다. 담당자로부터 승인 코드를 받으면 로그인하세요.",
        "success"
      );
    }

    function approveUser(name, password) {
      localStorage.setItem("blessingApprovedUser", JSON.stringify({ name, password }));
    }

    function isApprovedUser(name, password) {
      const approved = loadApprovedUser();
      return approved && approved.name === name && approved.password === password;
    }

    function login(name) {
      authScreen.classList.add("hidden");
      appScreen.classList.remove("hidden");
      welcomeText.textContent = `${name}님, 축복이 페이지에 오신 것을 환영합니다!`;
      setMessage("", "success");
    }

    function handleLogin(event) {
      if (event) event.preventDefault();
      const name = nameInput.value.trim();
      const password = passwordInput.value.trim();
      const approvalCode = approvalInput.value.trim();

      if (!validateCredentials(name, password)) {
        setMessage("이름과 4자리 숫자 비밀번호를 정확히 입력하세요.", "error");
        return;
      }

      if (isApprovedUser(name, password)) {
        login(name);
        return;
      }

      if (approvalCode && approvalCode === APPROVAL_CODE) {
        approveUser(name, password);
        setMessage("승인 코드가 확인되었습니다. 이제 접속할 수 있습니다.", "success");
        login(name);
        return;
      }

      setMessage(
        "승인되지 않은 사용자입니다. 먼저 권한 요청 후 관리자 승인 코드를 입력하거나, 이미 승인된 정보로 로그인하세요.",
        "error"
      );
    }

    function updateCountdownValue(el, value) {
      el.textContent = value;
      el.classList.add("pulse");
      setTimeout(() => el.classList.remove("pulse"), 700);
    }

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;

      if (diff <= 0) {
        updateCountdownValue(daysEl, "0");
        updateCountdownValue(hoursEl, "00");
        updateCountdownValue(minutesEl, "00");
        updateCountdownValue(secondsEl, "00");
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      updateCountdownValue(daysEl, days.toString());
      updateCountdownValue(hoursEl, String(hours).padStart(2, "0"));
      updateCountdownValue(minutesEl, String(minutes).padStart(2, "0"));
      updateCountdownValue(secondsEl, String(seconds).padStart(2, "0"));
    }

    function loadGallery() {
      return JSON.parse(localStorage.getItem("blessingGallery") || "[]");
    }

    function saveGallery(items) {
      localStorage.setItem("blessingGallery", JSON.stringify(items));
    }

    function renderGallery() {
      const items = loadGallery();
      galleryGrid.innerHTML = "";
      if (items.length === 0) {
        galleryGrid.innerHTML = `<p class="help-text">아직 등록된 사진이 없어요. 사진을 추가해보세요.</p>`;
        return;
      }

      items.slice().reverse().forEach((item) => {
        const img = document.createElement("img");
        img.src = item.data;
        img.alt = `갤러리 이미지 ${item.date}`;
        galleryGrid.appendChild(img);
      });
    }

    function addPhotoToGallery(file) {
      if (!file) {
        setMessage("사진을 선택해 주세요.", "error");
        return;
      }

      const reader = new FileReader();
      reader.onload = function () {
        const items = loadGallery();
        items.push({
          id: Date.now(),
          date: new Date().toISOString(),
          data: reader.result,
        });
        saveGallery(items);
        renderGallery();
        photoInput.value = "";
        setMessage("사진이 갤러리에 추가되었습니다.", "success");
      };
      reader.readAsDataURL(file);
    }

    function loadGuestbook() {
      return JSON.parse(localStorage.getItem("blessingGuestbook") || "[]");
    }

    function saveGuestbook(entries) {
      localStorage.setItem("blessingGuestbook", JSON.stringify(entries));
    }

    function renderGuestbook() {
      const entries = loadGuestbook();
      guestbookList.innerHTML = "";

      if (entries.length === 0) {
        guestbookList.innerHTML = `<p class="help-text">첫 번째 메시지를 남겨보세요!</p>`;
        return;
      }

      entries.slice().reverse().forEach((entry) => {
        const item = document.createElement("div");
        item.className = "guestbook-item";
        item.innerHTML = `
          <time>${new Date(entry.date).toLocaleString("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })}</time>
          <p>${entry.text}</p>
        `;
        guestbookList.appendChild(item);
      });
    }

    function addGuestbookEntry(text) {
      const entries = loadGuestbook();
      entries.push({
        id: Date.now(),
        date: new Date().toISOString(),
        text: text.trim(),
      });
      saveGuestbook(entries);
      renderGuestbook();
    }

    requestBtn.addEventListener("click", requestAccess);
    authForm.addEventListener("submit", handleLogin);

    galleryForm.addEventListener("submit", function (event) {
      event.preventDefault();
      addPhotoToGallery(photoInput.files[0]);
    });

    guestbookForm.addEventListener("submit", function (event) {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) {
        setMessage("남기고 싶은 메시지를 작성해 주세요.", "error");
        return;
      }
      addGuestbookEntry(message);
      messageInput.value = "";
      setMessage("한마디가 등록되었습니다.", "success");
    });

    logoutBtn.addEventListener("click", function () {
      authScreen.classList.remove("hidden");
      appScreen.classList.add("hidden");
      setMessage("로그아웃되었습니다. 다시 로그인하세요.", "success");
      approvalInput.value = "";
    });

    function initialize() {
      const approved = loadApprovedUser();
      if (approved) {
        setMessage(
          `이미 승인된 사용자 정보가 있습니다. ${approved.name}님은 이름과 비밀번호로 로그인하세요.`,
          "success"
        );
      }

      renderGallery();
      renderGuestbook();
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    initialize();
  </script>
</body>
</html>
