<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>축복이와 함께하는 우리집</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-soft: #f1f5f9;
      --text: #102a43;
      --muted: #64748b;
      --accent: #38bdf8;
      --accent-strong: #0ea5e9;
      --success: #2dd4bf;
      --danger: #fb7185;
      --radius: 26px;
      --shadow: 0 24px 60px rgba(16, 42, 67, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 26%),
        linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 18px 36px;
    }

    .hero {
      background: var(--surface);
      border: 1px solid rgba(16, 42, 67, 0.08);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.05;
      font-weight: 800;
      color: #0f172a;
      margin: 0;
    }

    .hero-subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(16, 42, 67, 0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 18px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
    }

    .form-group {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"],
    input[type="file"],
    textarea {
      width: 100%;
      border: 1px solid rgba(16, 42, 67, 0.12);
      border-radius: 18px;
      background: var(--surface-soft);
      color: var(--text);
      padding: 14px 16px;
      font-size: 1rem;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .row {
      display: grid;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button.secondary {
      color: var(--text);
      background: #f1f5f9;
      box-shadow: inset 0 0 0 1px rgba(16, 42, 67, 0.08);
    }

    button.danger {
      background: linear-gradient(135deg, #fb7185, #f97316);
    }

    .help-text {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.6;
    }

    .message {
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-top: 12px;
    }

    .message.success {
      background: rgba(45, 212, 191, 0.14);
      color: #0f766e;
    }

    .message.error {
      background: rgba(251, 113, 133, 0.14);
      color: #b91c1c;
    }

    .hidden { display: none !important; }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .countdown-card {
      background: var(--surface-soft);
      border-radius: 20px;
      padding: 18px;
      text-align: center;
    }

    .countdown-card strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 8px;
      color: #0f172a;
    }

    .countdown-card span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pulse { animation: pulse 0.7s ease; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }

    .gallery-grid,
    .guestbook-list {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .gallery-card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid rgba(16, 42, 67, 0.08);
    }

    .gallery-card img {
      width: 100%;
      height: 190px;
      object-fit: cover;
      display: block;
    }

    .gallery-card time {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(255,255,255,0.92);
      color: #102a43;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .guestbook-item {
      background: var(--surface-soft);
      border: 1px solid rgba(16, 42, 67, 0.08);
      border-radius: 20px;
      padding: 16px;
    }

    .guestbook-item time {
      display: block;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .top-bar strong {
      color: #0f172a;
    }

    .section-divider {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section-divider h3 {
      margin: 0;
      font-size: 1rem;
      color: #0f172a;
    }

    @media (min-width: 640px) { .row { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="hero">
        <div class="hero-title">축복이와 함께하는<br/>우리집</div>
        <p class="hero-subtitle">밝고 따뜻한 분위기로 꾸민 축복이 공간입니다. 로그인 후 사진 갤러리와 방명록을 자유롭게 이용해 보세요.</p>
      </div>
    </header>

    <section id="auth-screen" class="card">
      <h2>접속 권한 확인</h2>
      <div id="login-info" class="help-text">처음 접속하면 이름과 4자리 비밀번호를 입력하고 권한 요청을 진행하세요. 승인된 이후 같은 정보로 바로 접속할 수 있습니다.</div>
      <form id="auth-form">
        <div class="form-group">
          <label>이름
            <input type="text" id="name-input" placeholder="이름을 입력하세요" autocomplete="name" required />
          </label>
          <label>4자리 비밀번호
            <input type="password" id="password-input" placeholder="1234" maxlength="4" pattern="\d{4}" required />
          </label>
          <label>승인 코드
            <input type="text" id="approval-input" placeholder="관리자 승인 코드 입력" autocomplete="off" />
          </label>
        </div>
        <div class="row">
          <button type="button" id="request-btn">권한 요청하기</button>
          <button type="submit" id="login-btn" class="secondary">로그인</button>
        </div>
      </form>
      <div id="auth-message"></div>
    </section>

    <main id="app-screen" class="hidden">
      <div class="top-bar">
        <strong id="welcome-text">환영합니다!</strong>
        <button id="logout-btn" class="secondary danger">로그아웃</button>
      </div>

      <section class="card">
        <h2>축복이 탄생일까지 남은 시간</h2>
        <div class="countdown-grid">
          <div class="countdown-card"><strong id="days">0</strong><span>일</span></div>
          <div class="countdown-card"><strong id="hours">00</strong><span>시간</span></div>
          <div class="countdown-card"><strong id="minutes">00</strong><span>분</span></div>
          <div class="countdown-card"><strong id="seconds">00</strong><span>초</span></div>
        </div>
      </section>

      <section class="card">
        <div class="section-divider"><h3>사진 갤러리</h3><span class="help-text">사진을 올리고 서로의 순간을 함께 나눠요.</span></div>
        <form id="gallery-form">
          <div class="form-group">
            <label>사진 선택
              <input type="file" id="photo-input" accept="image/*" />
            </label>
          </div>
          <button type="submit">갤러리에 추가</button>
        </form>
        <div id="gallery-grid" class="gallery-grid"></div>
      </section>

      <section class="card">
        <div class="section-divider"><h3>한줄 방명록</h3><span class="help-text">축복이에게 전하는 마음을 남겨보세요.</span></div>
        <form id="guestbook-form">
          <div class="form-group">
            <label>메시지
              <textarea id="message-input" maxlength="120" placeholder="축복이에게 남기고 싶은 말을 적어주세요." required></textarea>
            </label>
          </div>
          <button type="submit">등록하기</button>
        </form>
        <div id="guestbook-list" class="guestbook-list"></div>
      </section>
    </main>
  </div>

  <script>
    const MANAGER_EMAIL = "yoonjks1017@gmail.com";
    const APPROVAL_CODE = "BLESSING2026";
    const authScreen = document.getElementById("auth-screen");
    const appScreen = document.getElementById("app-screen");
    const authForm = document.getElementById("auth-form");
    const requestBtn = document.getElementById("request-btn");
    const nameInput = document.getElementById("name-input");
    const passwordInput = document.getElementById("password-input");
    const approvalInput = document.getElementById("approval-input");
    const authMessage = document.getElementById("auth-message");
    const loginInfo = document.getElementById("login-info");
    const welcomeText = document.getElementById("welcome-text");
    const logoutBtn = document.getElementById("logout-btn");
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const galleryForm = document.getElementById("gallery-form");
    const photoInput = document.getElementById("photo-input");
    const galleryGrid = document.getElementById("gallery-grid");
    const guestbookForm = document.getElementById("guestbook-form");
    const messageInput = document.getElementById("message-input");
    const guestbookList = document.getElementById("guestbook-list");
    const targetDate = new Date("2026-10-23T00:00:00");

    function loadApprovedUser() {
      return JSON.parse(localStorage.getItem("blessingApprovedUser") || "null");
    }

    function setMessage(text, type = "success") {
      authMessage.innerHTML = `<div class="message ${type}">${text}</div>`;
    }

    function validateCredentials(name, password) {
      return name && /^\d{4}$/.test(password);
    }

    function openMailClient(name, password) {
      const subject = encodeURIComponent("축복이 홈페이지 접속 권한 요청");
      const body = encodeURIComponent(`안녕하세요,\n\n이름: ${name}\n비밀번호: ${password}\n\n접속 권한을 요청합니다.\n`);
      window.location.href = `mailto:${MANAGER_EMAIL}?subject=${subject}&body=${body}`;
    }

    function requestAccess() {
      const name = nameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!validateCredentials(name, password)) {
        setMessage("이름과 4자리 숫자 비밀번호를 정확히 입력하세요.", "error");
        return;
      }
      localStorage.setItem("blessingAccessRequest", JSON.stringify({ name, password, requestedAt: new Date().toISOString() }));
      openMailClient(name, password);
      setMessage("메일 클라이언트가 열렸습니다. 담당자에게 승인 코드를 요청하세요.", "success");
    }

    function approveUser(name, password) {
      localStorage.setItem("blessingApprovedUser", JSON.stringify({ name, password }));
    }

    function isApprovedUser(name, password) {
      const approved = loadApprovedUser();
      return approved && approved.name === name && approved.password === password;
    }

    function login(name) {
      authScreen.classList.add("hidden");
      appScreen.classList.remove("hidden");
      welcomeText.textContent = `${name}님, 축복이 페이지에 오신 것을 환영합니다!`;
      setMessage("", "success");
      loginInfo.classList.add("hidden");
    }

    function handleLogin(event) {
      if (event) event.preventDefault();
      const name = nameInput.value.trim();
      const password = passwordInput.value.trim();
      const approvalCode = approvalInput.value.trim();
      if (!validateCredentials(name, password)) {
        setMessage("이름과 4자리 숫자 비밀번호를 정확히 입력하세요.", "error");
        return;
      }
      if (isApprovedUser(name, password)) {
        login(name);
        return;
      }
      if (approvalCode && approvalCode === APPROVAL_CODE) {
        approveUser(name, password);
        login(name);
        return;
      }
      setMessage("승인되지 않은 사용자입니다. 권한 요청 후 승인 코드를 입력해 주세요.", "error");
    }

    function updateCountdownValue(el, value) {
      el.textContent = value;
      el.classList.add("pulse");
      setTimeout(() => el.classList.remove("pulse"), 700);
    }

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;
      if (diff <= 0) {
        updateCountdownValue(daysEl, "0");
        updateCountdownValue(hoursEl, "00");
        updateCountdownValue(minutesEl, "00");
        updateCountdownValue(secondsEl, "00");
        return;
      }
      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      updateCountdownValue(daysEl, days.toString());
      updateCountdownValue(hoursEl, String(hours).padStart(2, "0"));
      updateCountdownValue(minutesEl, String(minutes).padStart(2, "0"));
      updateCountdownValue(secondsEl, String(seconds).padStart(2, "0"));
    }

    function loadGallery() {
      return JSON.parse(localStorage.getItem("blessingGallery") || "[]");
    }

    function saveGallery(items) {
      localStorage.setItem("blessingGallery", JSON.stringify(items));
    }

    function renderGallery() {
      const items = loadGallery();
      galleryGrid.innerHTML = "";
      if (items.length === 0) {
        galleryGrid.innerHTML = `<p class="help-text">아직 등록된 사진이 없어요. 사진을 추가해보세요.</p>`;
        return;
      }
      items.slice().reverse().forEach((item) => {
        const card = document.createElement("div");
        card.className = "gallery-card";
        card.innerHTML = `
          <img src="${item.data}" alt="갤러리 사진" />
          <time>${new Date(item.date).toLocaleString("ko-KR", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })}</time>
        `;
        galleryGrid.appendChild(card);
      });
    }

    function addPhotoToGallery(file) {
      if (!file) {
        setMessage("사진을 선택해 주세요.", "error");
        return;
      }
      const reader = new FileReader();
      reader.onload = function () {
        const items = loadGallery();
        items.push({ id: Date.now(), date: new Date().toISOString(), data: reader.result });
        saveGallery(items);
        renderGallery();
        photoInput.value = "";
        setMessage("갤러리에 사진이 추가되었습니다.", "success");
      };
      reader.readAsDataURL(file);
    }

    function loadGuestbook() {
      return JSON.parse(localStorage.getItem("blessingGuestbook") || "[]");
    }

    function saveGuestbook(entries) {
      localStorage.setItem("blessingGuestbook", JSON.stringify(entries));
    }

    function renderGuestbook() {
      const entries = loadGuestbook();
      guestbookList.innerHTML = "";
      if (entries.length === 0) {
        guestbookList.innerHTML = `<p class="help-text">첫 번째 메시지를 남겨보세요!</p>`;
        return;
      }
      entries.slice().reverse().forEach((entry) => {
        const item = document.createElement("div");
        item.className = "guestbook-item";
        item.innerHTML = `
          <time>${new Date(entry.date).toLocaleString("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })}</time>
          <p>${entry.text}</p>
        `;
        guestbookList.appendChild(item);
      });
    }

    function addGuestbookEntry(text) {
      const entries = loadGuestbook();
      entries.push({ id: Date.now(), date: new Date().toISOString(), text: text.trim() });
      saveGuestbook(entries);
      renderGuestbook();
    }

    requestBtn.addEventListener("click", requestAccess);
    authForm.addEventListener("submit", handleLogin);
    galleryForm.addEventListener("submit", function (event) {
      event.preventDefault();
      addPhotoToGallery(photoInput.files[0]);
    });
    guestbookForm.addEventListener("submit", function (event) {
      event.preventDefault();
      const message = messageInput.value.trim();
      if (!message) {
        setMessage("메시지를 입력해 주세요.", "error");
        return;
      }
      addGuestbookEntry(message);
      messageInput.value = "";
      setMessage("한마디가 등록되었습니다.", "success");
    });
    logoutBtn.addEventListener("click", function () {
      authScreen.classList.remove("hidden");
      appScreen.classList.add("hidden");
      setMessage("로그아웃되었습니다. 다시 로그인하세요.", "success");
      approvalInput.value = "";
      loginInfo.classList.remove("hidden");
    });

    function initialize() {
      const approved = loadApprovedUser();
      if (approved) {
        setMessage(`${approved.name}님은 이미 승인된 사용자입니다. 이름과 비밀번호로 로그인하세요.`, "success");
      }
      renderGallery();
      renderGuestbook();
      updateCountdown();
      setInterval(updateCountdown, 1000);
    }

    initialize();
  </script>
</body>
</html>
